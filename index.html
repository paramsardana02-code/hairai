<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HairAI – Your Personal Hair Care Analyst</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --green-deep:   #0d3b2e;
    --green-mid:    #1a5c45;
    --green-main:   #2e8b5a;
    --green-bright: #3dba7a;
    --green-light:  #a8f0c6;
    --green-pale:   #e8faf1;
    --cream:        #f7f5f0;
    --ink:          #0f1f18;
    --muted:        #5a7a6a;
    --card-bg:      #ffffff;
    --border:       #c8e8d8;
    --shadow:       rgba(46,139,90,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body.hindi { font-family: 'Noto Sans Devanagari', 'DM Sans', sans-serif; }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(61,186,122,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(13,59,46,0.10) 0%, transparent 55%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; top: -80px; right: -80px;
    width: 340px; height: 340px; z-index: 0;
    background: radial-gradient(circle, rgba(61,186,122,0.18) 0%, transparent 70%);
    border-radius: 50%; pointer-events: none;
  }
  .wrapper { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

  /* lang toggle */
  .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 24px; }
  .lang-toggle { display: flex; background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 50px; overflow: hidden; box-shadow: 0 2px 10px var(--shadow); }
  .lang-btn { padding: 7px 18px; font-size: .82rem; font-weight: 600; border: none; background: transparent; color: var(--muted); cursor: pointer; transition: all .2s; font-family: inherit; }
  .lang-btn.active { background: var(--green-main); color: white; border-radius: 50px; }
  .lang-btn:hover:not(.active) { color: var(--green-main); }

  header { text-align: center; margin-bottom: 48px; animation: fadeDown .7s ease both; }
  .logo-icon { display: inline-flex; align-items: center; justify-content: center; width: 68px; height: 68px; background: linear-gradient(135deg, var(--green-main), var(--green-bright)); border-radius: 20px; margin-bottom: 16px; box-shadow: 0 8px 28px rgba(46,139,90,0.35); }
  .logo-icon svg { width: 36px; height: 36px; fill: white; }
  header h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3rem); color: var(--green-deep); letter-spacing: -0.5px; line-height: 1.1; }
  header h1 span { color: var(--green-bright); font-style: italic; }
  header p { margin-top: 10px; color: var(--muted); font-size: .95rem; font-weight: 400; }

  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 40px 44px; box-shadow: 0 4px 40px var(--shadow); animation: fadeUp .7s ease both; }
  @media(max-width: 540px) { .card { padding: 28px 20px; } }

  .section-label { font-size: .7rem; font-weight: 600; letter-spacing: 1.4px; text-transform: uppercase; color: var(--green-main); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field-group { margin-bottom: 28px; }
  .field-label { display: block; font-size: .875rem; font-weight: 500; color: var(--green-deep); margin-bottom: 10px; }

  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill-group input[type="radio"] { display: none; }
  .pill { cursor: pointer; padding: 8px 18px; border-radius: 50px; border: 1.5px solid var(--border); background: var(--green-pale); font-size: .85rem; font-weight: 500; color: var(--muted); transition: all .2s ease; user-select: none; }
  .pill:hover { border-color: var(--green-main); color: var(--green-main); }
  .pill-group input:checked + .pill { background: var(--green-main); border-color: var(--green-main); color: white; box-shadow: 0 3px 12px rgba(46,139,90,0.30); }

  .age-input { width: 130px; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-family: inherit; font-size: .95rem; color: var(--ink); background: var(--green-pale); outline: none; transition: border-color .2s; }
  .age-input:focus { border-color: var(--green-main); }

  .btn-analyze { width: 100%; margin-top: 8px; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); color: white; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; box-shadow: 0 6px 20px rgba(46,139,90,0.35); transition: transform .15s, box-shadow .15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-analyze:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(46,139,90,0.42); }
  .btn-analyze:active { transform: translateY(0); }
  .btn-analyze:disabled { opacity: .6; cursor: not-allowed; transform: none; }

  .loader { display: none; width: 20px; height: 20px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }

  .error-box { background: #fff4f4; border: 1px solid #f5c6c6; border-radius: 12px; padding: 16px 20px; color: #c0392b; font-size: .9rem; margin-top: 20px; }

  /* ── results ── */
  #results { margin-top: 40px; animation: fadeUp .6s ease both; }
  .results-top { margin-bottom: 28px; }
  .results-top h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--green-deep); margin-bottom: 8px; }
  body.hindi .results-top h2 { font-family: 'Noto Sans Devanagari', sans-serif; font-weight: 600; }
  .badge-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 4px 12px; background: var(--green-pale); border: 1px solid var(--green-light); border-radius: 20px; font-size: .75rem; font-weight: 600; color: var(--green-main); letter-spacing: .5px; text-transform: uppercase; }
  .badge.dark { background: var(--green-deep); color: white; border-color: var(--green-deep); }

  /* ── weekly plan tab bar ── */
  .week-nav {
    display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto;
    margin-bottom: 24px; padding-bottom: 4px;
    scrollbar-width: none;
  }
  .week-nav::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--card-bg);
    font-size: .82rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
    font-family: inherit;
  }
  .day-tab:hover { border-color: var(--green-main); color: var(--green-main); }
  .day-tab.active { background: var(--green-main); border-color: var(--green-main); color: white; box-shadow: 0 3px 12px rgba(46,139,90,0.30); }

  /* ── day card ── */
  .day-panel { display: none; }
  .day-panel.visible { display: block; animation: fadeUp .4s ease both; }

  .day-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 24px var(--shadow);
    margin-bottom: 16px;
  }
  .day-card-header {
    background: linear-gradient(135deg, var(--green-mid), var(--green-main));
    color: white;
    padding: 18px 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .day-card-header .day-icon { font-size: 1.4rem; }
  .day-card-header h3 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; }
  body.hindi .day-card-header h3 { font-family: 'Noto Sans Devanagari', sans-serif; font-weight: 600; }
  .day-card-header .day-subtitle { font-size: .78rem; opacity: .85; margin-top: 2px; }

  .session-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  @media(max-width: 560px) { .session-grid { grid-template-columns: 1fr; } }

  .session {
    padding: 20px 24px;
    border-right: 1px solid var(--border);
  }
  .session:last-child { border-right: none; }
  @media(max-width: 560px) {
    .session { border-right: none; border-bottom: 1px solid var(--border); }
    .session:last-child { border-bottom: none; }
  }

  .session-title {
    font-size: .72rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
  }
  .session-title.morning { color: #c07a00; }
  .session-title.night { color: #3a5a8a; }
  .session-title .dot { width: 7px; height: 7px; border-radius: 50%; }
  .session-title.morning .dot { background: #f5a623; }
  .session-title.night .dot { background: #5b8dd9; }

  .session ul { list-style: none; padding: 0; }
  .session ul li {
    padding: 6px 0 6px 20px;
    position: relative;
    font-size: .88rem;
    line-height: 1.55;
    color: var(--ink);
    border-bottom: 1px solid rgba(200,232,216,0.5);
  }
  .session ul li:last-child { border-bottom: none; }
  .session ul li::before {
    content: '';
    position: absolute; left: 0; top: 13px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green-bright);
  }
  .session ul li strong { color: var(--green-deep); }

  /* tip strip */
  .day-tip {
    background: var(--green-pale);
    border-top: 1px solid var(--border);
    padding: 12px 24px;
    font-size: .82rem;
    color: var(--muted);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .day-tip span { flex: 1; }

  /* loading skeleton */
  .skel { background: linear-gradient(90deg, #e8faf1 25%, #d0f0e0 50%, #e8faf1 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; height: 14px; margin-bottom: 8px; }
  @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

  footer { text-align: center; margin-top: 48px; color: var(--muted); font-size: .78rem; opacity: .8; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px) } to { opacity:1; transform:none } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(20px)  } to { opacity:1; transform:none } }
  @keyframes spin     { to { transform: rotate(360deg) } }
</style>
</head>
<body>
<div class="wrapper">

  <div class="lang-bar">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">🇬🇧 English</button>
      <button class="lang-btn" id="btn-hi" onclick="setLang('hi')">🇮🇳 हिन्दी</button>
    </div>
  </div>

  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C9.5 2 7 4 7 7c0 2 1 3.5 2.5 4.5C7.5 13 6 15.5 6 18c0 2.5 1.5 4 3 4 .5 0 1-.2 1.5-.5C11 22 11.5 22 12 22s1 0 1.5-.5c.5.3 1 .5 1.5.5 1.5 0 3-1.5 3-4 0-2.5-1.5-5-3.5-6.5C16 10.5 17 9 17 7c0-3-2.5-5-5-5zm0 2c1.7 0 3 1.3 3 3 0 1.4-.8 2.6-2 3.2V12h-2v-1.8C9.8 9.6 9 8.4 9 7c0-1.7 1.3-3 3-3zm-1 14v2.7c-.3.2-.7.3-1 .3-.8 0-1-.7-1-2 0-1.7 1-3.5 2-4.7V16h-.5c-.3 0-.5.1-.5.2zm2 0v.3-.5c1 1.2 2 3 2 4.7 0 1.3-.2 2-1 2-.3 0-.7-.1-1-.3V16z"/></svg>
    </div>
    <h1>Hair<span>AI</span></h1>
    <p data-en="Your personalised 7-day hair care plan, made for India" data-hi="भारत के लिए आपकी व्यक्तिगत 7-दिवसीय बाल देखभाल योजना">Your personalised 7-day hair care plan, made for India</p>
  </header>

  <div class="card">
    <div class="section-label" data-en="Tell us about yourself" data-hi="अपने बारे में बताएं">Tell us about yourself</div>

    <div class="field-group">
      <label class="field-label" data-en="Primary hair concern" data-hi="मुख्य बाल समस्या">Primary hair concern</label>
      <div class="pill-group">
        <input type="radio" name="problem" id="p-hairfall" value="Hairfall"><label class="pill" for="p-hairfall"><span data-en="🌿 Hairfall" data-hi="🌿 बाल झड़ना">🌿 Hairfall</span></label>
        <input type="radio" name="problem" id="p-dandruff" value="Dandruff"><label class="pill" for="p-dandruff"><span data-en="❄️ Dandruff" data-hi="❄️ रूसी">❄️ Dandruff</span></label>
        <input type="radio" name="problem" id="p-growth" value="Slow Growth"><label class="pill" for="p-growth"><span data-en="🌱 Slow Growth" data-hi="🌱 धीमी वृद्धि">🌱 Slow Growth</span></label>
        <input type="radio" name="problem" id="p-dryness" value="Dryness"><label class="pill" for="p-dryness"><span data-en="💧 Dryness" data-hi="💧 रूखापन">💧 Dryness</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" data-en="Scalp type" data-hi="स्कैल्प का प्रकार">Scalp type</label>
      <div class="pill-group">
        <input type="radio" name="scalp" id="sc-oily" value="Oily Scalp"><label class="pill" for="sc-oily"><span data-en="💛 Oily" data-hi="💛 तैलीय">💛 Oily</span></label>
        <input type="radio" name="scalp" id="sc-dry" value="Dry Scalp"><label class="pill" for="sc-dry"><span data-en="🤍 Dry" data-hi="🤍 रूखी">🤍 Dry</span></label>
        <input type="radio" name="scalp" id="sc-normal" value="Normal Scalp"><label class="pill" for="sc-normal"><span data-en="✅ Normal" data-hi="✅ सामान्य">✅ Normal</span></label>
        <input type="radio" name="scalp" id="sc-combo" value="Combination Scalp"><label class="pill" for="sc-combo"><span data-en="⚖️ Combination" data-hi="⚖️ मिश्रित">⚖️ Combination</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" data-en="Diet type" data-hi="आहार प्रकार">Diet type</label>
      <div class="pill-group">
        <input type="radio" name="diet" id="d-veg" value="Vegetarian"><label class="pill" for="d-veg"><span data-en="🥦 Vegetarian" data-hi="🥦 शाकाहारी">🥦 Vegetarian</span></label>
        <input type="radio" name="diet" id="d-nonveg" value="Non-Vegetarian"><label class="pill" for="d-nonveg"><span data-en="🍗 Non-Vegetarian" data-hi="🍗 मांसाहारी">🍗 Non-Vegetarian</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" data-en="Water type" data-hi="पानी का प्रकार">Water type</label>
      <div class="pill-group">
        <input type="radio" name="water" id="w-hard" value="Hard Water"><label class="pill" for="w-hard"><span data-en="🪨 Hard Water" data-hi="🪨 कठोर पानी">🪨 Hard Water</span></label>
        <input type="radio" name="water" id="w-soft" value="Soft Water"><label class="pill" for="w-soft"><span data-en="🌊 Soft Water" data-hi="🌊 मृदु पानी">🌊 Soft Water</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" data-en="Stress level" data-hi="तनाव का स्तर">Stress level</label>
      <div class="pill-group">
        <input type="radio" name="stress" id="s-high" value="High Stress"><label class="pill" for="s-high"><span data-en="🔴 High" data-hi="🔴 अधिक">🔴 High</span></label>
        <input type="radio" name="stress" id="s-med" value="Medium Stress"><label class="pill" for="s-med"><span data-en="🟡 Medium" data-hi="🟡 मध्यम">🟡 Medium</span></label>
        <input type="radio" name="stress" id="s-low" value="Low Stress"><label class="pill" for="s-low"><span data-en="🟢 Low" data-hi="🟢 कम">🟢 Low</span></label>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="age" data-en="Your age" data-hi="आपकी उम्र">Your age</label>
      <input type="number" id="age" class="age-input" min="10" max="90" placeholder="e.g. 26" data-en-placeholder="e.g. 26" data-hi-placeholder="जैसे 26"/>
    </div>

    <button class="btn-analyze" id="analyze-btn" onclick="analyze()">
      <span id="btn-text" data-en="Generate My 7-Day Plan" data-hi="मेरी 7-दिवसीय योजना बनाएं">Generate My 7-Day Plan</span>
      <div class="loader" id="loader"></div>
    </button>
    <div id="error-container"></div>
  </div>

  <!-- RESULTS -->
  <div id="results" style="display:none">
    <div class="results-top">
      <h2 id="results-title">Your 7-Day Hair Care Plan</h2>
      <div class="badge-row" id="badge-row"></div>
    </div>
    <div class="week-nav" id="week-nav"></div>
    <div id="day-panels"></div>
  </div>

  <footer>
    <span data-en="Powered by Claude AI · Made for Indian hair & climate · For guidance only, not medical advice."
          data-hi="Claude AI द्वारा संचालित · भारतीय बालों के लिए बना · केवल मार्गदर्शन के लिए, चिकित्सा सलाह नहीं।">
      Powered by Claude AI · Made for Indian hair &amp; climate · For guidance only, not medical advice.
    </span>
  </footer>
</div>

<script>
let currentLang = 'en';

const DAYS_EN = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAYS_HI = ['सोमवार','मंगलवार','बुधवार','गुरुवार','शुक्रवार','शनिवार','रविवार'];
const DAY_ICONS = ['🌱','🌿','💧','🌸','✨','🌺','🌙'];
const DAY_SUBTITLES_EN = ['Start strong','Build the habit','Hydration day','Deep care','Refresh & protect','Weekly treatment day','Rest & restore'];
const DAY_SUBTITLES_HI = ['मजबूत शुरुआत','आदत बनाएं','जलयोजन दिवस','गहरी देखभाल','ताजगी और सुरक्षा','साप्ताहिक उपचार','आराम और पुनर्जीवन'];

function setLang(lang) {
  currentLang = lang;
  document.body.classList.toggle('hindi', lang === 'hi');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-hi').classList.toggle('active', lang === 'hi');
  document.querySelectorAll('[data-en]').forEach(el => {
    const val = el.getAttribute('data-' + lang);
    if (val !== null) el.innerHTML = val;
  });
  const ai = document.getElementById('age');
  ai.placeholder = ai.getAttribute('data-' + lang + '-placeholder');
  const btn = document.getElementById('analyze-btn');
  if (!btn.disabled) {
    document.getElementById('btn-text').textContent =
      lang === 'hi' ? 'मेरी 7-दिवसीय योजना बनाएं' : 'Generate My 7-Day Plan';
  }
}

function getVal(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : null;
}

function showTab(idx) {
  document.querySelectorAll('.day-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.day-panel').forEach((p,i) => p.classList.toggle('visible', i===idx));
}

function buildSkeleton() {
  const days = currentLang === 'hi' ? DAYS_HI : DAYS_EN;
  const nav = document.getElementById('week-nav');
  const panels = document.getElementById('day-panels');
  nav.innerHTML = '';
  panels.innerHTML = '';
  days.forEach((day, i) => {
    const tab = document.createElement('button');
    tab.className = 'day-tab' + (i===0 ? ' active' : '');
    tab.textContent = day;
    tab.onclick = () => showTab(i);
    nav.appendChild(tab);

    const panel = document.createElement('div');
    panel.className = 'day-panel' + (i===0 ? ' visible' : '');
    panel.innerHTML = `
      <div class="day-card">
        <div class="day-card-header">
          <span class="day-icon">${DAY_ICONS[i]}</span>
          <div><h3>${day}</h3><div class="day-subtitle">${currentLang==='hi'?'लोड हो रहा है…':'Loading…'}</div></div>
        </div>
        <div class="session-grid">
          <div class="session"><div class="skel" style="width:60%"></div><div class="skel"></div><div class="skel" style="width:80%"></div><div class="skel" style="width:70%"></div></div>
          <div class="session"><div class="skel" style="width:60%"></div><div class="skel"></div><div class="skel" style="width:80%"></div><div class="skel" style="width:70%"></div></div>
        </div>
      </div>`;
    panels.appendChild(panel);
  });
}

function renderDayCard(dayData, index) {
  const isHi = currentLang === 'hi';
  const days = isHi ? DAYS_HI : DAYS_EN;
  const subs = isHi ? DAY_SUBTITLES_HI : DAY_SUBTITLES_EN;

  const morningLabel = isHi ? '☀️ सुबह की दिनचर्या' : '☀️ Morning Routine';
  const nightLabel   = isHi ? '🌙 रात की दिनचर्या'   : '🌙 Night Routine';
  const tipLabel     = isHi ? '💡 आज का टिप'          : '💡 Today\'s Tip';

  const morningItems = (dayData.morning || []).map(s => `<li>${s}</li>`).join('');
  const nightItems   = (dayData.night   || []).map(s => `<li>${s}</li>`).join('');
  const tip = dayData.tip || '';

  return `
    <div class="day-card">
      <div class="day-card-header">
        <span class="day-icon">${DAY_ICONS[index]}</span>
        <div><h3>${days[index]}</h3><div class="day-subtitle">${subs[index]}</div></div>
      </div>
      <div class="session-grid">
        <div class="session">
          <div class="session-title morning"><span class="dot"></span>${morningLabel}</div>
          <ul>${morningItems || '<li>—</li>'}</ul>
        </div>
        <div class="session">
          <div class="session-title night"><span class="dot"></span>${nightLabel}</div>
          <ul>${nightItems || '<li>—</li>'}</ul>
        </div>
      </div>
      ${tip ? `<div class="day-tip">💡 <span><strong>${tipLabel}:</strong> ${tip}</span></div>` : ''}
    </div>`;
}

async function analyze() {
  const problem = getVal('problem');
  const scalp   = getVal('scalp');
  const diet    = getVal('diet');
  const water   = getVal('water');
  const stress  = getVal('stress');
  const age     = document.getElementById('age').value.trim();

  const errBox = document.getElementById('error-container');
  errBox.innerHTML = '';

  if (!problem || !scalp || !diet || !water || !stress || !age) {
    errBox.innerHTML = `<div class="error-box">${currentLang==='hi'?'⚠️ कृपया सभी प्रश्नों के उत्तर दें।':'⚠️ Please fill in all fields before generating.'}</div>`;
    return;
  }

  const btn = document.getElementById('analyze-btn');
  btn.disabled = true;
  document.getElementById('loader').style.display = 'block';
  document.getElementById('btn-text').textContent = currentLang==='hi' ? 'योजना बन रही है…' : 'Building your plan…';

  // Show results area with skeletons immediately
  document.getElementById('results').style.display = 'block';
  document.getElementById('results-title').textContent = currentLang==='hi' ? 'आपकी 7-दिवसीय बाल देखभाल योजना' : 'Your 7-Day Hair Care Plan';
  document.getElementById('badge-row').innerHTML = `
    <span class="badge">${problem}</span>
    <span class="badge dark">${scalp.replace(' Scalp','')}</span>
    <span class="badge">${diet}</span>`;
  buildSkeleton();
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

  const isHi = currentLang === 'hi';

  const systemPrompt = isHi
    ? `आप HairAI हैं — भारतीय बाल स्वास्थ्य विशेषज्ञ। आपको केवल JSON में उत्तर देना है — कोई अतिरिक्त टेक्स्ट नहीं, कोई मार्कडाउन नहीं।`
    : `You are HairAI, an expert trichologist specialising in Indian hair health. You must reply ONLY with valid JSON — no extra text, no markdown fences.`;

  const userPrompt = isHi ? `
उपयोगकर्ता की जानकारी:
- बाल समस्या: ${problem}
- स्कैल्प: ${scalp}
- आहार: ${diet}
- पानी: ${water}
- तनाव: ${stress}
- उम्र: ${age}

एक पूर्ण 7-दिवसीय बाल देखभाल योजना बनाएं। हर दिन के लिए सुबह (3-4 चरण) और रात (2-3 चरण) की दिनचर्या और एक टिप दें।

विशेष ध्यान दें:
- स्कैल्प प्रकार के अनुसार सलाह दें
- कठोर पानी होने पर नींबू/गुलाब जल रिंस सुझाएं
- भारतीय घरेलू नुस्खे शामिल करें (आंवला, नारियल तेल, नीम, मेथी, भृंगराज आदि)
- रविवार को साप्ताहिक उपचार (हेयर मास्क/डीप कंडीशनिंग) रखें
- शनिवार को तेल मालिश (चंपी) रखें

निम्न JSON format में उत्तर दें — केवल JSON, कुछ और नहीं:
{
  "days": [
    {
      "morning": ["चरण 1", "चरण 2", "चरण 3"],
      "night": ["चरण 1", "चरण 2"],
      "tip": "आज का एक उपयोगी टिप"
    }
  ]
}
days array में सोमवार से रविवार तक 7 objects होने चाहिए।`

  : `User profile:
- Hair concern: ${problem}
- Scalp type: ${scalp}
- Diet: ${diet}
- Water: ${water}
- Stress: ${stress}
- Age: ${age}

Create a complete 7-day personalised Indian hair care plan. For each day give a morning routine (3-4 steps), night routine (2-3 steps), and one practical tip.

Rules:
- Tailor every day to the scalp type (${scalp})
- Hard water users: include lemon/rose water final rinse on wash days
- Weave in Indian home remedies naturally (amla, coconut oil, neem, methi, bhringraj, onion juice, curd, hibiscus etc.)
- Saturday: champi (scalp oil massage) before night sleep
- Sunday: weekly deep treatment (hair mask or hot oil wrap)
- Vary the routine meaningfully day by day — avoid repetition
- Keep steps concise and actionable (one action per step)

Reply ONLY with this exact JSON structure, nothing else:

  "days": [
    {
      "morning": ["Step 1", "Step 2", "Step 3"],
      "night": ["Step 1", "Step 2"],
      "tip": "One practical tip for the day"
    }
  ]
}
The days array must have exactly 7 objects (Monday through Sunday).`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2500,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    let raw = data.content.map(b => b.text || '').join('').trim();
    // strip any accidental fences
    raw = raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
